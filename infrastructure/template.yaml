AWSTemplateFormatVersion: "2010-09-09"
Description: PokerFX card detection infrastructure — ECR repository, AWS Batch compute environment, job queue, job definition, IAM roles, and CloudWatch log group.

Parameters:
  Environment:
    Type: String
    Default: production
    AllowedValues: [production, staging]
    Description: Environment name used for resource naming

  S3BucketName:
    Type: String
    Default: pokerfx-uploads
    Description: S3 bucket for video uploads and thumbnail results

  DynamoDBTableName:
    Type: String
    Default: pokerfx
    Description: DynamoDB table for video and hand data

  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Subnets where Batch compute instances will run (use your default VPC subnets)

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC for the Batch compute environment

Mappings:
  InstanceTypes:
    production:
      PrimaryType: c6i.xlarge
      FallbackType: c5.xlarge
    staging:
      PrimaryType: c6i.large
      FallbackType: c5.large

Resources:

  # ─── ECR Repository ─────────────────────────────────────────────────────────
  WorkerRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: pokerfx/card-detect-worker
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Keep only 10 untagged images",
                "selection": {
                  "tagStatus": "untagged",
                  "countType": "imageCountMoreThan",
                  "countNumber": 10
                },
                "action": { "type": "expire" }
              },
              {
                "rulePriority": 2,
                "description": "Keep latest 5 tagged images",
                "selection": {
                  "tagStatus": "tagged",
                  "tagPrefixList": ["v"],
                  "countType": "imageCountMoreThan",
                  "countNumber": 5
                },
                "action": { "type": "expire" }
              }
            ]
          }

  # ─── IAM: Batch Service Role ────────────────────────────────────────────────
  BatchServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub pokerfx-batch-service-${Environment}
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: batch.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSBatchServiceRole

  # ─── IAM: Batch Job Execution Role ──────────────────────────────────────────
  BatchExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub pokerfx-batch-execution-${Environment}
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  # ─── IAM: Batch Job Role (used by worker container) ─────────────────────────
  BatchJobRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub pokerfx-batch-job-${Environment}
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ReadInputVideos
                Effect: Allow
                Action: [s3:GetObject]
                Resource: !Sub "arn:aws:s3:::${S3BucketName}/uploads/*"
              - Sid: WriteThumbnails
                Effect: Allow
                Action: [s3:PutObject]
                Resource: !Sub "arn:aws:s3:::${S3BucketName}/thumbnails/*"
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:Query
                  - dynamodb:BatchWriteItem
                Resource:
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${DynamoDBTableName}"
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${DynamoDBTableName}/index/*"
        - PolicyName: SecretsManagerAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: [secretsmanager:GetSecretValue]
                Resource:
                  - !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:pokerfx/anthropic-*"
                  - !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:pokerfx/openai-*"
                  - !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:pokerfx/vision-api-*"

  # ─── IAM: Instance Role for EC2 compute ─────────────────────────────────────
  BatchInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub pokerfx-batch-instance-${Environment}
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEC2ContainerServiceforEC2Role
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

  BatchInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub pokerfx-batch-instance-${Environment}
      Roles: [!Ref BatchInstanceRole]

  # ─── Security Group ─────────────────────────────────────────────────────────
  BatchSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for PokerFX Batch worker instances
      GroupName: !Sub pokerfx-batch-sg-${Environment}
      VpcId: !Ref VpcId
      SecurityGroupIngress: []
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound

  # ─── CloudWatch Log Group ───────────────────────────────────────────────────
  BatchLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/batch/job/pokerfx-${Environment}
      RetentionInDays: 14

  # ─── AWS Batch: Compute Environment ─────────────────────────────────────────
  ComputeEnvironment:
    Type: AWS::Batch::ComputeEnvironment
    Properties:
      ComputeEnvironmentName: !Sub pokerfx-compute-${Environment}
      Type: MANAGED
      State: ENABLED
      ComputeResources:
        Type: SPOT
        AllocationStrategy: BEST_FIT_PROGRESSIVE
        MinvCpus: 0
        MaxvCpus: 16
        DesiredvCpus: 0
        InstanceTypes:
          - !FindInMap [InstanceTypes, !Ref Environment, PrimaryType]
          - !FindInMap [InstanceTypes, !Ref Environment, FallbackType]
          - m6i.xlarge
        Subnets: !Ref SubnetIds
        SecurityGroupIds: [!Ref BatchSecurityGroup]
        InstanceRole: !Ref BatchInstanceProfile
        Tags:
          Name: !Sub pokerfx-worker-${Environment}
          Project: pokerfx
      ServiceRole: !GetAtt BatchServiceRole.Arn

  # ─── AWS Batch: Job Queue ───────────────────────────────────────────────────
  JobQueue:
    Type: AWS::Batch::JobQueue
    Properties:
      JobQueueName: !Sub pokerfx-queue-${Environment}
      Priority: 1
      State: ENABLED
      ComputeEnvironmentOrder:
        - Order: 1
          ComputeEnvironment: !Ref ComputeEnvironment

  # ─── AWS Batch: Job Definition ──────────────────────────────────────────────
  JobDefinition:
    Type: AWS::Batch::JobDefinition
    Properties:
      JobDefinitionName: !Sub pokerfx-detect-v1-${Environment}
      Type: container
      Timeout:
        AttemptDurationSeconds: 900
      RetryStrategy:
        Attempts: 2
      ContainerProperties:
        Image: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${WorkerRepository}:latest"
        Vcpus: 4
        Memory: 8192
        JobRoleArn: !GetAtt BatchJobRole.Arn
        ExecutionRoleArn: !GetAtt BatchExecutionRole.Arn
        ReadonlyRootFilesystem: false
        LinuxParameters:
          MaxSwap: 4096
          Swappiness: 60
        Environment:
          - Name: AWS_REGION
            Value: !Ref AWS::Region
          - Name: S3_BUCKET
            Value: !Ref S3BucketName
          - Name: DYNAMODB_TABLE
            Value: !Ref DynamoDBTableName
          - Name: VISION_PROVIDER
            Value: anthropic
        Secrets:
          - Name: ANTHROPIC_API_KEY
            ValueFrom: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:pokerfx/anthropic"
          - Name: OPENAI_API_KEY
            ValueFrom: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:pokerfx/openai"
        LogConfiguration:
          LogDriver: awslogs
          Options:
            awslogs-group: !Ref BatchLogGroup
            awslogs-region: !Ref AWS::Region
            awslogs-stream-prefix: batch

Outputs:
  ECRRepositoryUri:
    Description: URI of the ECR repository for the worker image
    Value: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${WorkerRepository}"

  JobQueueArn:
    Description: ARN of the Batch job queue
    Value: !GetAtt JobQueue.JobQueueArn

  JobDefinitionArn:
    Description: ARN of the Batch job definition
    Value: !GetAtt JobDefinition.JobDefinitionArn

  JobRoleArn:
    Description: ARN of the IAM role used by Batch job containers
    Value: !GetAtt BatchJobRole.Arn

  BatchLogGroupName:
    Description: CloudWatch log group for Batch jobs
    Value: !Ref BatchLogGroup
